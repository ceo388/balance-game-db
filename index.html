<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>밸런스 게임 · 둘 중 하나</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.9/babel.min.js"></script>
  <style>
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in-up { animation: fadeInUp 0.35s ease-out both; }
    @keyframes pop {
      0% { transform: scale(0.96); }
      50% { transform: scale(1.02); }
      100% { transform: scale(1); }
    }
    .animate-pop { animation: pop 0.25s ease-out; }
    .bar-fill { transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1); }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback, useRef } = React;

    // ========================================
    // 🔧 Constants & Helpers
    // ========================================
    const API_BASE_URL = '/api';                 // 상대경로 — 어느 호스트에서도 동작
    const VOTER_ID_KEY = 'balance_game_voter_id'; // 이 브라우저의 투표자 식별용 UUID (단순 식별 목적)

    // 투표자 식별 UUID (없으면 생성해서 localStorage에 유지)
    const getVoterId = () => {
      try {
        let id = localStorage.getItem(VOTER_ID_KEY);
        if (!id) {
          id = (crypto.randomUUID
            ? crypto.randomUUID()
            : Date.now().toString(36) + Math.random().toString(36).slice(2, 10));
          localStorage.setItem(VOTER_ID_KEY, id);
        }
        return id;
      } catch (e) {
        // localStorage 불가 환경 fallback (세션 한정)
        return Date.now().toString(36) + Math.random().toString(36).slice(2, 10);
      }
    };

    const pct = (part, total) => (total === 0 ? 0 : Math.round((part / total) * 100));

    // 공통 fetch 헬퍼 — JSON 응답 + 에러 처리
    const apiFetch = async (path, options = {}) => {
      const res = await fetch(`${API_BASE_URL}${path}`, {
        headers: { 'Content-Type': 'application/json' },
        ...options,
      });
      let body = null;
      try { body = await res.json(); } catch (e) { /* no body */ }
      if (!res.ok || !body || body.success === false) {
        const msg = (body && body.message) || `요청 실패 (${res.status})`;
        throw new Error(msg);
      }
      return body;
    };

    // ========================================
    // 🎨 Design System Components
    // ========================================
    function Button({ variant = 'primary', size = 'md', disabled, onClick, type = 'button', className = '', children }) {
      const base =
        'inline-flex items-center justify-center font-semibold rounded-xl transition-all duration-150 focus:outline-none focus:ring-2 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed active:scale-[0.97]';
      const variants = {
        primary: 'bg-indigo-600 text-white hover:bg-indigo-700 focus:ring-indigo-500 shadow-sm',
        secondary: 'bg-white text-slate-700 border border-slate-300 hover:bg-slate-50 focus:ring-slate-400',
        danger: 'bg-red-50 text-red-600 hover:bg-red-100 focus:ring-red-400',
        ghost: 'bg-transparent text-slate-500 hover:bg-slate-100 focus:ring-slate-300',
      };
      const sizes = { sm: 'px-3 py-1.5 text-sm', md: 'px-4 py-2.5 text-sm', lg: 'px-6 py-3 text-base' };
      return (
        <button
          type={type}
          disabled={disabled}
          onClick={onClick}
          className={`${base} ${variants[variant]} ${sizes[size]} ${className}`}
        >
          {children}
        </button>
      );
    }

    function Input({ label, value, onChange, placeholder, error, maxLength, autoFocus }) {
      return (
        <label className="block">
          {label && <span className="block mb-1.5 text-sm font-medium text-slate-700">{label}</span>}
          <input
            type="text"
            value={value}
            onChange={onChange}
            placeholder={placeholder}
            maxLength={maxLength}
            autoFocus={autoFocus}
            className={`w-full px-4 py-3 rounded-xl border bg-white text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 transition
              ${error ? 'border-red-400 focus:ring-red-300' : 'border-slate-300 focus:ring-indigo-300 focus:border-indigo-400'}`}
          />
          {error && <span className="block mt-1 text-xs text-red-500">{error}</span>}
        </label>
      );
    }

    function Card({ className = '', children }) {
      return (
        <div className={`bg-white rounded-2xl shadow-sm border border-slate-100 ${className}`}>
          {children}
        </div>
      );
    }

    function Modal({ isOpen, onClose, title, children }) {
      useEffect(() => {
        if (!isOpen) return;
        const onKey = (e) => e.key === 'Escape' && onClose();
        window.addEventListener('keydown', onKey);
        document.body.style.overflow = 'hidden';
        return () => {
          window.removeEventListener('keydown', onKey);
          document.body.style.overflow = '';
        };
      }, [isOpen, onClose]);

      if (!isOpen) return null;
      return (
        <div
          className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-slate-900/50 backdrop-blur-sm p-0 sm:p-4"
          onClick={onClose}
          role="dialog"
          aria-modal="true"
        >
          <div
            className="w-full sm:max-w-lg bg-white rounded-t-3xl sm:rounded-3xl shadow-2xl animate-fade-in-up"
            onClick={(e) => e.stopPropagation()}
          >
            <div className="flex items-center justify-between px-6 pt-6 pb-2">
              <h2 className="text-lg font-bold text-slate-800">{title}</h2>
              <button
                onClick={onClose}
                aria-label="닫기"
                className="text-slate-400 hover:text-slate-600 rounded-lg p-1 hover:bg-slate-100"
              >
                <svg className="w-6 h-6" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
              </button>
            </div>
            <div className="px-6 pb-6">{children}</div>
          </div>
        </div>
      );
    }

    function Badge({ className = '', children }) {
      return (
        <span className={`inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold ${className}`}>
          {children}
        </span>
      );
    }

    // ========================================
    // 🧩 Question Card (투표 + 결과)
    // ========================================
    function QuestionCard({ question, myVote, onVote, onDelete }) {
      const total = question.votesA + question.votesB;
      const percentA = pct(question.votesA, total);
      const percentB = pct(question.votesB, total);
      const voted = Boolean(myVote);

      const Option = ({ side, text, count, percent }) => {
        const isA = side === 'A';
        const chosen = myVote === side;
        const accent = isA ? 'indigo' : 'rose';
        const barClass = isA
          ? 'bg-gradient-to-r from-indigo-500 to-indigo-400'
          : 'bg-gradient-to-r from-rose-500 to-rose-400';

        return (
          <button
            onClick={() => onVote(question.id, side)}
            aria-pressed={chosen}
            className={`group relative w-full text-left rounded-2xl border-2 p-4 transition-all duration-150 overflow-hidden
              ${chosen
                ? `border-${accent}-500 ring-2 ring-${accent}-200`
                : 'border-slate-200 hover:border-slate-300 hover:bg-slate-50'}`}
          >
            {/* 결과 진행 바 배경 */}
            {voted && (
              <div className="absolute inset-y-0 left-0 -z-0">
                <div
                  className={`h-full bar-fill ${isA ? 'bg-indigo-50' : 'bg-rose-50'}`}
                  style={{ width: `${percent}%` }}
                />
              </div>
            )}

            <div className="relative z-10 flex items-center justify-between gap-3">
              <div className="flex items-center gap-2 min-w-0">
                <span
                  className={`flex-shrink-0 w-7 h-7 rounded-lg flex items-center justify-center text-sm font-extrabold
                    ${isA ? 'bg-indigo-100 text-indigo-700' : 'bg-rose-100 text-rose-700'}`}
                >
                  {side}
                </span>
                <span className="font-semibold text-slate-800 break-words">{text}</span>
              </div>

              {voted && (
                <div className="flex-shrink-0 text-right">
                  <div className={`text-lg font-extrabold ${isA ? 'text-indigo-600' : 'text-rose-600'}`}>
                    {percent}%
                  </div>
                  <div className="text-[11px] text-slate-400">{count}표</div>
                </div>
              )}

              {chosen && (
                <Badge className={`${isA ? 'bg-indigo-600' : 'bg-rose-600'} text-white absolute -top-0 right-0 hidden`}>
                  내 선택
                </Badge>
              )}
            </div>

            {/* 슬림 진행 바 */}
            {voted && (
              <div className="relative z-10 mt-3 h-2 rounded-full bg-slate-100 overflow-hidden">
                <div className={`h-full rounded-full bar-fill ${barClass}`} style={{ width: `${percent}%` }} />
              </div>
            )}

            {chosen && (
              <span className="relative z-10 mt-2 inline-block text-xs font-semibold text-emerald-600">
                ✓ 내 선택
              </span>
            )}
          </button>
        );
      };

      return (
        <Card className="p-5 animate-fade-in-up">
          <div className="flex items-start justify-between mb-4">
            <div className="flex items-center gap-2 text-xs font-medium text-slate-400">
              <span className="inline-block w-2 h-2 rounded-full bg-indigo-400"></span>
              밸런스 게임
            </div>
            <button
              onClick={() => onDelete(question.id)}
              aria-label="질문 삭제"
              className="text-slate-300 hover:text-red-500 transition p-1 rounded-lg hover:bg-red-50"
            >
              <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
              </svg>
            </button>
          </div>

          <div className="space-y-2.5">
            <Option side="A" text={question.optionA} count={question.votesA} percent={percentA} />
            <div className="flex items-center justify-center">
              <span className="px-3 py-0.5 rounded-full bg-slate-800 text-white text-xs font-bold tracking-wide">VS</span>
            </div>
            <Option side="B" text={question.optionB} count={question.votesB} percent={percentB} />
          </div>

          <div className="mt-4 flex items-center justify-between text-sm">
            <span className="text-slate-500">
              총 <span className="font-bold text-slate-700">{total.toLocaleString()}</span>명 참여
            </span>
            {voted ? (
              <span className="text-xs text-slate-400">눌러서 선택 변경 가능</span>
            ) : (
              <span className="text-xs font-medium text-indigo-500 animate-pop">선택지를 눌러 투표하세요</span>
            )}
          </div>
        </Card>
      );
    }

    // ========================================
    // 🧩 Create Question Form (Modal 내부)
    // ========================================
    function CreateQuestionForm({ onCreate, onClose }) {
      const [a, setA] = useState('');
      const [b, setB] = useState('');
      const [errors, setErrors] = useState({});

      const submit = () => {
        const next = {};
        if (!a.trim()) next.a = 'A안을 입력해주세요.';
        if (!b.trim()) next.b = 'B안을 입력해주세요.';
        if (a.trim() && b.trim() && a.trim() === b.trim()) next.b = '두 선택지가 같아요.';
        setErrors(next);
        if (Object.keys(next).length > 0) return;
        onCreate(a.trim(), b.trim());
        onClose();
      };

      return (
        <div className="space-y-4">
          <p className="text-sm text-slate-500">
            두 가지 선택지를 입력해 새로운 밸런스 게임을 만들어보세요.
          </p>
          <div className="rounded-2xl bg-indigo-50/60 p-4 space-y-3">
            <Input
              label="A안"
              value={a}
              onChange={(e) => setA(e.target.value)}
              placeholder="예: 월급 500 + 주7일 출근"
              error={errors.a}
              maxLength={60}
              autoFocus
            />
            <div className="flex justify-center">
              <span className="px-3 py-0.5 rounded-full bg-slate-800 text-white text-xs font-bold">VS</span>
            </div>
            <Input
              label="B안"
              value={b}
              onChange={(e) => setB(e.target.value)}
              placeholder="예: 월급 300 + 주4일 출근"
              error={errors.b}
              maxLength={60}
            />
          </div>
          <div className="flex gap-2 pt-1">
            <Button variant="secondary" className="flex-1" onClick={onClose}>취소</Button>
            <Button variant="primary" className="flex-1" onClick={submit}>등록하기</Button>
          </div>
        </div>
      );
    }

    // ========================================
    // 🚀 App
    // ========================================
    function App() {
      const [questions, setQuestions] = useState([]);
      const [modalOpen, setModalOpen] = useState(false);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const voterId = useMemo(() => getVoterId(), []);

      // myVotes 는 서버 응답의 myVote 필드에서 파생
      const myVotes = useMemo(() => {
        const map = {};
        questions.forEach((q) => { if (q.myVote) map[q.id] = q.myVote; });
        return map;
      }, [questions]);

      // 질문 목록 로드
      const loadQuestions = useCallback(async () => {
        setError(null);
        try {
          const body = await apiFetch(`/questions?voterId=${encodeURIComponent(voterId)}`);
          setQuestions(body.data);
        } catch (e) {
          setError(e.message || '데이터를 불러오지 못했습니다.');
        } finally {
          setLoading(false);
        }
      }, [voterId]);

      useEffect(() => { loadQuestions(); }, [loadQuestions]);

      // 투표 / 선택 변경 — 서버가 재계산한 최신 득표 수로 갱신
      const handleVote = useCallback(async (questionId, side) => {
        const current = questions.find((q) => q.id === questionId);
        if (current && current.myVote === side) return; // 같은 선택지 재클릭은 무시
        try {
          const body = await apiFetch(`/questions/${questionId}/vote`, {
            method: 'POST',
            body: JSON.stringify({ voterId, choice: side }),
          });
          setQuestions((qs) => qs.map((q) => (q.id === questionId ? body.data : q)));
        } catch (e) {
          setError(e.message || '투표에 실패했습니다.');
        }
      }, [questions, voterId]);

      const handleCreate = useCallback(async (optionA, optionB) => {
        try {
          const body = await apiFetch(`/questions`, {
            method: 'POST',
            body: JSON.stringify({ optionA, optionB }),
          });
          setQuestions((qs) => [body.data, ...qs]);
        } catch (e) {
          setError(e.message || '질문 등록에 실패했습니다.');
        }
      }, []);

      const handleDelete = useCallback(async (questionId) => {
        try {
          await apiFetch(`/questions/${questionId}`, { method: 'DELETE' });
          setQuestions((qs) => qs.filter((q) => q.id !== questionId));
        } catch (e) {
          setError(e.message || '질문 삭제에 실패했습니다.');
        }
      }, []);

      // 통계
      const stats = useMemo(() => {
        const totalVotes = questions.reduce((s, q) => s + q.votesA + q.votesB, 0);
        const votedCount = questions.filter((q) => q.myVote).length;
        return { questionCount: questions.length, totalVotes, votedCount };
      }, [questions]);

      // 서버가 이미 created_at DESC 로 정렬해 보내므로 그대로 사용
      const sorted = questions;

      return (
        <div className="min-h-screen">
          {/* Header */}
          <header className="bg-gradient-to-br from-indigo-600 via-indigo-500 to-violet-500 text-white">
            <div className="max-w-2xl mx-auto px-5 pt-10 pb-8">
              <div className="flex items-center gap-2 text-indigo-100 text-sm font-medium mb-2">
                <span className="text-lg">⚖️</span> 밸런스 게임
              </div>
              <h1 className="text-3xl font-extrabold tracking-tight">둘 중 하나, 당신의 선택은?</h1>
              <p className="mt-2 text-indigo-100 text-sm">
                선택지를 누르면 실시간으로 득표율이 갱신됩니다.
              </p>

              <div className="mt-6 grid grid-cols-3 gap-3">
                <div className="rounded-2xl bg-white/15 backdrop-blur px-3 py-3 text-center">
                  <div className="text-2xl font-extrabold">{stats.questionCount}</div>
                  <div className="text-[11px] text-indigo-100">질문</div>
                </div>
                <div className="rounded-2xl bg-white/15 backdrop-blur px-3 py-3 text-center">
                  <div className="text-2xl font-extrabold">{stats.totalVotes.toLocaleString()}</div>
                  <div className="text-[11px] text-indigo-100">총 투표 수</div>
                </div>
                <div className="rounded-2xl bg-white/15 backdrop-blur px-3 py-3 text-center">
                  <div className="text-2xl font-extrabold">{stats.votedCount}</div>
                  <div className="text-[11px] text-indigo-100">내 참여</div>
                </div>
              </div>
            </div>
          </header>

          {/* Body */}
          <main className="max-w-2xl mx-auto px-5 -mt-5 pb-28">
            <Button
              size="lg"
              className="w-full mb-5 shadow-lg shadow-indigo-200"
              onClick={() => setModalOpen(true)}
            >
              <svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" d="M12 4v16m8-8H4" />
              </svg>
              새 밸런스 게임 만들기
            </Button>

            {error && (
              <div className="mb-4 flex items-center justify-between gap-3 rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-600">
                <span>⚠️ {error}</span>
                <button
                  onClick={loadQuestions}
                  className="flex-shrink-0 font-semibold text-red-700 underline hover:text-red-800"
                >
                  다시 시도
                </button>
              </div>
            )}

            {loading ? (
              <Card className="p-12 text-center">
                <div className="text-4xl mb-3 animate-pop">⏳</div>
                <p className="font-semibold text-slate-700">불러오는 중...</p>
                <p className="text-sm text-slate-400 mt-1">서버에서 질문을 가져오고 있어요.</p>
              </Card>
            ) : sorted.length === 0 ? (
              <Card className="p-12 text-center">
                <div className="text-5xl mb-3">🤔</div>
                <p className="font-semibold text-slate-700">아직 등록된 질문이 없어요</p>
                <p className="text-sm text-slate-400 mt-1">위 버튼을 눌러 첫 밸런스 게임을 만들어보세요.</p>
              </Card>
            ) : (
              <div className="space-y-4">
                {sorted.map((q) => (
                  <QuestionCard
                    key={q.id}
                    question={q}
                    myVote={myVotes[q.id]}
                    onVote={handleVote}
                    onDelete={handleDelete}
                  />
                ))}
              </div>
            )}
          </main>

          {/* Floating button (모바일 보조) */}
          <button
            onClick={() => setModalOpen(true)}
            aria-label="새 질문 만들기"
            className="sm:hidden fixed bottom-6 right-6 z-40 w-14 h-14 rounded-full bg-indigo-600 text-white shadow-xl shadow-indigo-300 flex items-center justify-center active:scale-95 transition"
          >
            <svg className="w-7 h-7" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24">
              <path strokeLinecap="round" strokeLinejoin="round" d="M12 4v16m8-8H4" />
            </svg>
          </button>

          <Modal isOpen={modalOpen} onClose={() => setModalOpen(false)} title="새 밸런스 게임 만들기">
            <CreateQuestionForm onCreate={handleCreate} onClose={() => setModalOpen(false)} />
          </Modal>

          <footer className="text-center text-xs text-slate-400 pb-8">
            데이터는 공용 서버(Postgres)에 저장되어 모두와 공유됩니다 · Supabase
          </footer>
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
